<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Toolkit di Valutazione Etica dell'IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ───────────────────────────────────────────────── */
:root,[data-theme="light"]{
  --color-bg:#F5F3ED;
  --color-surface:#FFFFFF;
  --color-surface-2:#F9F8F5;
  --color-surface-offset:#F0EDE7;
  --color-border:#E2DDD4;
  --color-divider:#EAE7E0;
  --color-text:#1C1C28;
  --color-text-muted:#6B6B7B;
  --color-text-faint:#AEADB8;
  --color-text-inverse:#FFFFFF;
  --color-primary:#01696f;
  --color-primary-hover:#0c4e54;
  --color-primary-hl:#cedcd8;
  --color-gold:#C9963B;
  --color-gold-light:#F0DEB4;
  --color-gold-hl:#FDF3E0;
  --color-blue:#1A6FA8;
  --color-blue-light:#EBF4FC;
  --color-blue-border:#6BAED6;
  --color-amber-bg:#FFF8E6;
  --color-amber-border:#E0A818;
  --color-green-bg:#F0FAF5;
  --color-green-border:#48BB78;
  --color-red-bg:#FCEBEB;
  --color-red-border:#F56565;
  --color-ok:#1D9E75;--color-ok-bg:#E1F5EE;--color-ok-pill:#9FE1CB;
  --color-partial:#E09A1E;--color-partial-bg:#FEF3DF;--color-partial-pill:#FAC775;
  --color-gap:#E24B4A;--color-gap-bg:#FCEBEB;--color-gap-pill:#F7C1C1;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans','Helvetica Neue',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --shadow-sm:0 1px 3px oklch(0.2 0.01 80/0.08);
  --shadow-md:0 4px 16px oklch(0.2 0.01 80/0.1);
  --shadow-lg:0 12px 40px oklch(0.2 0.01 80/0.14);
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --content:960px;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#252422;--color-border:#393836;--color-divider:#2a2927;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-hl:#313b3b;
  --color-gold:#e8af34;--color-gold-light:#4d4332;--color-gold-hl:#3a3220;
  --color-blue-light:#1a2a38;--color-blue-border:#3a6080;
  --color-amber-bg:#2a2518;--color-amber-border:#8a6010;
  --color-green-bg:#152820;--color-green-border:#2d7a50;
  --color-red-bg:#2a1515;--color-red-border:#8a3030;
  --color-ok:#3dbd90;--color-ok-bg:#0e2820;--color-ok-pill:#1a4535;
  --color-partial:#e8a830;--color-partial-bg:#2a2010;--color-partial-pill:#4a3010;
  --color-gap:#e05050;--color-gap-bg:#2a1010;--color-gap-pill:#4a1515;
  --shadow-sm:0 1px 3px oklch(0 0 0/0.25);
  --shadow-md:0 4px 16px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 40px oklch(0 0 0/0.45);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#252422;--color-border:#393836;--color-divider:#2a2927;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;--color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-hl:#313b3b;--color-gold:#e8af34;--color-gold-light:#4d4332;
  --color-gold-hl:#3a3220;--color-blue-light:#1a2a38;--color-blue-border:#3a6080;
  --color-amber-bg:#2a2518;--color-amber-border:#8a6010;--color-green-bg:#152820;
  --color-green-border:#2d7a50;--color-red-bg:#2a1515;--color-red-border:#8a3030;
  --color-ok:#3dbd90;--color-ok-bg:#0e2820;--color-ok-pill:#1a4535;
  --color-partial:#e8a830;--color-partial-bg:#2a2010;--color-partial-pill:#4a3010;
  --color-gap:#e05050;--color-gap-bg:#2a1010;--color-gap-pill:#4a1515;
  --shadow-sm:0 1px 3px oklch(0 0 0/0.25);
  --shadow-md:0 4px 16px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 40px oklch(0 0 0/0.45);
}}

/* ── BASE ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;font-size:16px}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6;transition:background var(--transition),color var(--transition)}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:inherit}
h1,h2,h3,h4{text-wrap:balance;line-height:1.2}
p,li{text-wrap:pretty;max-width:72ch}
::selection{background:oklch(from var(--color-primary) l c h/0.2)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── LAYOUT ───────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100dvh}
.container{max-width:var(--content);margin-inline:auto;padding-inline:var(--space-4)}

/* ── HEADER ───────────────────────────────────────────────── */
.header{background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.header-inner{display:flex;align-items:center;gap:var(--space-4);padding-block:var(--space-3)}
.logo{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text);flex-shrink:0}
.logo-icon{width:32px;height:32px;color:var(--color-primary)}
.logo-text{font-family:var(--font-display);font-size:var(--text-base);font-weight:400;letter-spacing:-0.01em}
.logo-text span{color:var(--color-primary)}
.header-progress{flex:1;display:flex;flex-direction:column;gap:var(--space-1)}
.progress-steps{display:flex;gap:var(--space-1)}
.progress-step{flex:1;height:3px;background:var(--color-border);border-radius:var(--radius-full);transition:background var(--transition)}
.progress-step.active{background:var(--color-primary)}
.progress-step.done{background:var(--color-primary);opacity:.5}
.progress-label{font-size:var(--text-xs);color:var(--color-text-muted);text-align:center;display:none}
.header-actions{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--color-text-muted);transition:background var(--transition),color var(--transition)}
.btn-icon:hover{background:var(--color-surface-offset);color:var(--color-text)}
.pct-badge{font-size:var(--text-xs);font-weight:600;color:var(--color-primary);background:var(--color-primary-hl);padding:var(--space-1) var(--space-2);border-radius:var(--radius-full)}

/* ── NAV TABS ─────────────────────────────────────────────── */
.nav-tabs{background:var(--color-surface);border-bottom:1px solid var(--color-border)}
.nav-tabs-inner{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-tabs-inner::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:var(--space-3) var(--space-4);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);border-bottom:2px solid transparent;transition:all var(--transition);white-space:nowrap;position:relative}
.nav-tab:hover{color:var(--color-text)}
.nav-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary)}
.nav-tab.done::after{content:'✓';position:absolute;top:var(--space-2);right:var(--space-2);font-size:9px;color:var(--color-ok);background:var(--color-ok-bg);border-radius:var(--radius-full);width:14px;height:14px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── MAIN ─────────────────────────────────────────────────── */
.main{flex:1;padding-block:var(--space-8)}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-5);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;transition:all var(--transition);border:1.5px solid transparent;line-height:1.4}
.btn-primary{background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
.btn-primary:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover)}
.btn-secondary{background:var(--color-surface);color:var(--color-text);border-color:var(--color-border)}
.btn-secondary:hover{background:var(--color-surface-offset);border-color:var(--color-text-muted)}
.btn-ghost{color:var(--color-text-muted);border-color:transparent}
.btn-ghost:hover{background:var(--color-surface-offset);color:var(--color-text)}
.btn-lg{padding:var(--space-3) var(--space-8);font-size:var(--text-base)}

/* ── CARDS ────────────────────────────────────────────────── */
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-6);box-shadow:var(--shadow-sm)}
.card-sm{padding:var(--space-4)}

/* ── BADGE / PILL ─────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:var(--space-1);padding:2px var(--space-2);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;line-height:1.5}
.pill-primary{background:var(--color-primary-hl);color:var(--color-primary)}
.pill-gold{background:var(--color-gold-hl);color:var(--color-gold)}

/* ── INTRO ────────────────────────────────────────────────── */
.intro-hero{text-align:center;padding-block:var(--space-12) var(--space-8)}
.intro-hero h1{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:400;margin-bottom:var(--space-3);line-height:1.1}
.intro-hero h1 em{font-style:italic;color:var(--color-primary)}
.intro-hero p{font-size:var(--text-lg);color:var(--color-text-muted);max-width:60ch;margin-inline:auto;margin-bottom:var(--space-8)}
.intro-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-4);margin-bottom:var(--space-8)}
.intro-tool{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5);transition:box-shadow var(--transition)}
.intro-tool:hover{box-shadow:var(--shadow-md)}
.intro-tool-icon{font-size:1.75rem;margin-bottom:var(--space-3)}
.intro-tool-title{font-weight:700;font-size:var(--text-sm);margin-bottom:var(--space-1)}
.intro-tool-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5}
.project-input-row{display:flex;gap:var(--space-3);align-items:flex-end;max-width:500px;margin-inline:auto;margin-bottom:var(--space-8)}
.form-group{flex:1;display:flex;flex-direction:column;gap:var(--space-1);text-align:left}
.form-label{font-size:var(--text-sm);font-weight:600;color:var(--color-text)}
.form-input{padding:var(--space-2) var(--space-3);border:1.5px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-2);color:var(--color-text);font-size:var(--text-sm);transition:border-color var(--transition)}
.form-input:focus{outline:none;border-color:var(--color-primary)}
.form-input::placeholder{color:var(--color-text-faint)}
.intro-quote{background:var(--color-gold-hl);border-left:3px solid var(--color-gold);border-radius:var(--radius-lg);padding:var(--space-6);margin-bottom:var(--space-4)}
.intro-quote blockquote{font-family:var(--font-display);font-style:italic;font-size:var(--text-lg);color:var(--color-text);margin-bottom:var(--space-2);line-height:1.4}
.intro-quote cite{font-size:var(--text-xs);color:var(--color-text-muted)}
.privacy-notice{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-muted);background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:var(--space-6)}

/* ── CHECKLIST ────────────────────────────────────────────── */
.checklist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6);flex-wrap:wrap;gap:var(--space-3)}
.checklist-header h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400}
.stats-row{display:flex;gap:var(--space-3);flex-wrap:wrap}
.stat-chip{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600}
.checklist-group{margin-bottom:var(--space-6)}
.group-header{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-3)}
.group-title{font-weight:700;font-size:var(--text-sm)}
.group-badge{font-size:var(--text-xs);padding:2px var(--space-2);border-radius:var(--radius-full);font-weight:600}
.checklist-items{display:flex;flex-direction:column;gap:var(--space-2)}
.checklist-item{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-4);background:var(--color-surface);border:1.5px solid var(--color-border);border-radius:var(--radius-lg);transition:all var(--transition);cursor:pointer}
.checklist-item:hover{border-color:var(--color-primary);box-shadow:var(--shadow-sm)}
.checklist-item.checked{background:var(--color-ok-bg);border-color:var(--color-ok)}
.checklist-item-check{width:22px;height:22px;flex-shrink:0;border-radius:var(--radius-sm);border:2px solid var(--color-border);display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all var(--transition)}
.checklist-item.checked .checklist-item-check{background:var(--color-ok);border-color:var(--color-ok)}
.checklist-item-text{flex:1}
.checklist-item-short{font-weight:600;font-size:var(--text-sm);margin-bottom:var(--space-1);color:var(--color-text)}
.checklist-item-full{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.5}
.checklist-item-tags{display:flex;gap:var(--space-2);margin-top:var(--space-2)}
.q-tag{font-size:var(--text-xs);padding:1px var(--space-2);border-radius:var(--radius-full);font-weight:600}
.tag-Q1{background:var(--color-blue-light);color:var(--color-blue)}
.tag-Q2{background:var(--color-amber-bg);color:var(--color-amber-border)}
.tag-Q3{background:var(--color-green-bg);color:var(--color-green-border)}
.tag-Q4{background:var(--color-red-bg);color:var(--color-gap)}

/* ── CANVAS ───────────────────────────────────────────────── */
.canvas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-4)}
.canvas-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5);transition:box-shadow var(--transition)}
.canvas-card:hover{box-shadow:var(--shadow-md)}
.canvas-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3)}
.canvas-card-title{display:flex;align-items:center;gap:var(--space-2);font-weight:700;font-size:var(--text-sm)}
.canvas-card-icon{font-size:1.2rem}
.canvas-status-dot{width:10px;height:10px;border-radius:var(--radius-full);flex-shrink:0}
.canvas-prompts{list-style:none;margin-bottom:var(--space-3)}
.canvas-prompts li{font-size:var(--text-xs);color:var(--color-text-muted);padding:var(--space-1) 0;border-bottom:1px dashed var(--color-divider)}
.canvas-prompts li:last-child{border:none}
.canvas-prompts li::before{content:'→ ';color:var(--color-primary)}
.canvas-items-list{display:flex;flex-direction:column;gap:var(--space-1)}
.canvas-mini-item{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-muted)}
.canvas-mini-dot{width:7px;height:7px;border-radius:var(--radius-full);flex-shrink:0}
.canvas-header{margin-bottom:var(--space-6)}
.canvas-header h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;margin-bottom:var(--space-2)}
.canvas-header p{font-size:var(--text-sm);color:var(--color-text-muted);max-width:65ch}
.status-legend{display:flex;gap:var(--space-4);margin-bottom:var(--space-6);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:var(--space-1);font-size:var(--text-xs);color:var(--color-text-muted)}
.legend-dot{width:10px;height:10px;border-radius:var(--radius-full)}

/* ── MATRIX ───────────────────────────────────────────────── */
.matrix-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
.matrix-card{border-radius:var(--radius-lg);padding:var(--space-5);border:1px solid}
.matrix-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--space-4)}
.matrix-card-title{font-weight:700;font-size:var(--text-base);margin-bottom:var(--space-1)}
.matrix-card-sub{font-size:var(--text-xs);opacity:.8}
.risk-pill{font-size:var(--text-xs);font-weight:700;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full)}
.matrix-items{display:flex;flex-direction:column;gap:var(--space-2)}
.matrix-item{padding:var(--space-3);background:oklch(from white l c h/0.7);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition);border:1px solid transparent}
[data-theme="dark"] .matrix-item{background:oklch(from black l c h/0.3)}
.matrix-item:hover{border-color:currentColor;opacity:.9}
.matrix-item.checked{opacity:1}
.matrix-item-text{font-size:var(--text-xs);line-height:1.4;font-weight:500}
.matrix-item-status{font-size:10px;margin-top:var(--space-1);font-weight:600}
.matrix-header{margin-bottom:var(--space-6)}
.matrix-header h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;margin-bottom:var(--space-2)}
.matrix-header p{font-size:var(--text-sm);color:var(--color-text-muted);max-width:65ch}
.matrix-axis-label{font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--space-2);text-align:center}

/* ── GUIDELINES ──────────────────────────────────────────── */
.guidelines-list{display:flex;flex-direction:column;gap:var(--space-4)}
.guideline-card{display:flex;gap:var(--space-5);padding:var(--space-6);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);transition:box-shadow var(--transition)}
.guideline-card:hover{box-shadow:var(--shadow-md)}
.guideline-number{font-family:var(--font-display);font-size:var(--text-2xl);color:var(--color-gold);line-height:1;flex-shrink:0;font-weight:400}
.guideline-icon{font-size:1.5rem;flex-shrink:0}
.guideline-body{flex:1}
.guideline-title{font-weight:700;font-size:var(--text-base);margin-bottom:var(--space-2)}
.guideline-text{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.7}
.guidelines-header{margin-bottom:var(--space-6)}
.guidelines-header h2{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;margin-bottom:var(--space-2)}
.guidelines-header p{font-size:var(--text-sm);color:var(--color-text-muted);max-width:65ch}

/* ── REPORT ──────────────────────────────────────────────── */
.report-header-section{background:linear-gradient(135deg,var(--color-surface),var(--color-gold-hl));border:1px solid var(--color-gold);border-radius:var(--radius-xl);padding:var(--space-8);margin-bottom:var(--space-6);text-align:center}
.report-project-name{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;margin-bottom:var(--space-2)}
.report-date{font-size:var(--text-sm);color:var(--color-text-muted)}
.report-score-ring{width:120px;height:120px;margin:var(--space-6) auto var(--space-4);position:relative;display:flex;align-items:center;justify-content:center}
.report-score-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.report-score-num{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;text-align:center;line-height:1}
.report-score-label{font-size:var(--text-xs);color:var(--color-text-muted)}
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-4);margin-bottom:var(--space-8)}
.report-area-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4)}
.report-area-icon{font-size:1.5rem;margin-bottom:var(--space-2)}
.report-area-title{font-weight:700;font-size:var(--text-sm);margin-bottom:var(--space-1)}
.report-area-status{font-size:var(--text-xs);font-weight:600}
.report-gaps{margin-bottom:var(--space-6)}
.report-gaps h3{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;margin-bottom:var(--space-4)}
.gap-item{display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3);background:var(--color-gap-bg);border:1px solid var(--color-gap);border-radius:var(--radius-md);margin-bottom:var(--space-2)}
.gap-icon{color:var(--color-gap);flex-shrink:0;margin-top:2px}
.gap-item-text{font-size:var(--text-sm)}
.report-actions{display:flex;gap:var(--space-3);flex-wrap:wrap;justify-content:center;margin-top:var(--space-8)}
.success-banner{background:var(--color-ok-bg);border:1px solid var(--color-ok);border-radius:var(--radius-lg);padding:var(--space-5);text-align:center;margin-bottom:var(--space-6)}
.success-banner .icon{font-size:2rem;margin-bottom:var(--space-2)}
.success-banner p{font-weight:600;color:var(--color-ok);font-size:var(--text-base)}
.report-header-section .btn-row{display:flex;gap:var(--space-3);justify-content:center;margin-top:var(--space-4)}

/* ── NAV FOOTER ───────────────────────────────────────────── */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:var(--space-10);padding-top:var(--space-6);border-top:1px solid var(--color-border)}

/* ── FOOTER ───────────────────────────────────────────────── */
.footer{background:var(--color-surface);border-top:1px solid var(--color-border);padding-block:var(--space-6)}
.footer-inner{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.footer-credits{font-size:var(--text-xs);color:var(--color-text-muted)}
.footer-credits a{color:var(--color-primary);text-decoration:none}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:640px){
  .matrix-grid{grid-template-columns:1fr}
  .intro-tools{grid-template-columns:1fr 1fr}
  .guideline-card{flex-direction:column;gap:var(--space-3)}
  .project-input-row{flex-direction:column}
  .header-inner{gap:var(--space-2)}
  .logo-text{display:none}
}
@media(max-width:480px){
  .intro-tools{grid-template-columns:1fr}
  .stats-row{display:none}
}

/* ── PRINT ────────────────────────────────────────────────── */
@media print{
  .header,.nav-tabs,.step-nav,.footer,.header-actions{display:none!important}
  .main{padding:0}
  .card,.canvas-card,.matrix-card,.guideline-card,.report-area-card{break-inside:avoid;box-shadow:none!important}
  body{background:white;color:black}
}

/* ── ANIMATIONS ───────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-content{animation:fadeIn .25s ease-out}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.checklist-item.checked .checklist-item-check{animation:checkPop .2s ease-out}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <!-- Logo SVG -->
        <a href="#" class="logo" onclick="return false">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="HR Toolkit di Valutazione Etica dell'IA">
            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 16 L14 20 L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="7" r="2" fill="currentColor" opacity=".4"/>
            <circle cx="25" cy="16" r="2" fill="currentColor" opacity=".4"/>
            <circle cx="16" cy="25" r="2" fill="currentColor" opacity=".4"/>
            <circle cx="7" cy="16" r="2" fill="currentColor" opacity=".4"/>
          </svg>
          <span class="logo-text">HR Toolkit di Valutazione <span>Etica</span> dell'IA</span>
        </a>

        <div class="header-progress">
          <div class="progress-steps" id="progressSteps"></div>
        </div>

        <div class="header-actions">
          <span class="pct-badge" id="pctBadge">0%</span>
          <button class="btn-icon" id="themeToggle" aria-label="Cambia tema" title="Cambia tema">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="btn-icon" id="resetBtn" aria-label="Reimposta" title="Reimposta tutto">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.9"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="nav-tabs" aria-label="Sezioni del toolkit">
    <div class="container">
      <div class="nav-tabs-inner" id="navTabs"></div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="container">
      <div id="stepContent"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-credits">Creato da <a href="https://www.linkedin.com/in/vittoriobellini-hrbp/" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary)">Vittorio Bellini</a> &nbsp;·&nbsp; Credits: <a href="https://prospettiveinorganizzazione.assioa.it/comprendere-i-bias-dellintelligenza-artificiale-riflessioni-da-una-prospettiva-imprenditoriale/" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary)">Smacchia, Cipriano e Za (2025)</a> — ProspettiveinOrganizzazione, ASSIOA.</p>
        <p class="footer-credits">🔒 I dati restano nel tuo browser — nessun server esterno.</p>
      </div>
    </div>
  </footer>

</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────
const ITEMS = [
  {id:1,group:"Dati",tag:"C",short:"Dati bilanciati per gruppi rilevanti",text:"I dati di addestramento coprono in modo bilanciato tutti i gruppi rilevanti (età, genere, settore, area geografica)?",Q:"Q1",area:"dati"},
  {id:2,group:"Dati",tag:"C",short:"Test per pattern anomali o sottorappresentazione",text:"Sono stati condotti test per verificare la presenza di pattern anomali o sottorappresentazione nei dataset?",Q:"Q1",area:"dati"},
  {id:3,group:"Dati",tag:"C",short:"Dati storici privi di bias discriminatori",text:"I dati storici usati per il training non incorporano decisioni umane passate discriminatorie (es. assunzioni, promozioni)?",Q:"Q1",area:"obiettivo"},
  {id:4,group:"Dati",tag:"C",short:"Processo documentato di aggiornamento modello",text:"Esiste un processo documentato di aggiornamento e riaddestramento periodico del modello?",Q:"Q1",area:"monitoring"},
  {id:5,group:"Dati",tag:"C",short:"Test su sottopopolazioni diverse",text:"Il modello è stato testato su sottopopolazioni diverse, non solo sul dataset complessivo?",Q:"Q1",area:"dati"},
  {id:6,group:"Algoritmo",tag:"C",short:"Metriche appropriate, non nascondono disparità",text:"Le metriche di performance scelte (accuracy, recall, F1…) sono appropriate per il contesto e non nascondono disparità di gruppo?",Q:"Q2",area:"ottimizzazione"},
  {id:7,group:"Algoritmo",tag:"C",short:"Modello sufficientemente spiegabile",text:"Il modello è \"spiegabile\" in misura sufficiente da permettere di comprendere le sue scelte principali?",Q:"Q1",area:"trasparenza"},
  {id:8,group:"Algoritmo",tag:"C",short:"Meccanismi di alert per output anomali",text:"Esistono meccanismi di alert per output anomali o statisticamente incoerenti con le attese?",Q:"Q1",area:"rischi"},
  {id:9,group:"Algoritmo",tag:"C",short:"Procedura di override umano definita",text:"È definita una procedura di override umano per i casi ad alto impatto?",Q:"Q2",area:"mitigazione"},
  {id:10,group:"Team",tag:"S",short:"Team diversificato per profilo e genere",text:"Il team di sviluppo è diversificato per profilo, background e genere?",Q:"Q3",area:"team"},
  {id:11,group:"Team",tag:"S",short:"Competenze etiche/giuridiche nel design",text:"Sono state coinvolte persone con competenze etiche, giuridiche o di scienze sociali nella fase di design?",Q:"Q3",area:"team"},
  {id:12,group:"Team",tag:"S",short:"Criteri ottimizzazione discussi con non-tecnici",text:"I criteri di \"ottimizzazione\" dell'algoritmo sono stati esplicitati e discussi anche da non-tecnici?",Q:"Q4",area:"ottimizzazione"},
  {id:13,group:"Team",tag:"S",short:"Definizioni di 'successo' riviste criticamente",text:"Le definizioni operative di \"successo\" o \"buon risultato\" usate dall'algoritmo sono state riviste criticamente?",Q:"Q4",area:"ottimizzazione"},
  {id:14,group:"Governance",tag:"S",short:"Ethical checkpoint nei milestone",text:"Esiste un \"ethical checkpoint\" formale (anche informale) nei milestone di progetto?",Q:"Q4",area:"mitigazione"},
  {id:15,group:"Governance",tag:"S",short:"Stakeholder consultati pre-deploy",text:"Gli stakeholder impattati dall'IA sono stati consultati prima del deploy?",Q:"Q3",area:"obiettivo"},
  {id:16,group:"Governance",tag:"S",short:"Canale segnalazione post-deploy",text:"È presente un canale per segnalare discriminazioni o output problematici post-deploy?",Q:"Q3",area:"monitoring"},
  {id:17,group:"Governance",tag:"S",short:"Responsabilità algoritmica attribuita",text:"La responsabilità sulle decisioni algoritmiche è chiaramente attribuita a una funzione aziendale?",Q:"Q4",area:"trasparenza"},
];
const GROUPS=[
  {key:"Dati",label:"Fase dati",badge:"Computazionale",color:"#1A6FA8"},
  {key:"Algoritmo",label:"Algoritmo e output",badge:"Computazionale",color:"#1A6FA8"},
  {key:"Team",label:"Team e progettazione",badge:"Sociale",color:"#0F6E56"},
  {key:"Governance",label:"Organizzazione e governance",badge:"Sociale",color:"#0F6E56"},
];
const CANVAS_AREAS=[
  {key:"obiettivo",icon:"🎯",label:"Obiettivo e contesto",items:[3,15],prompts:["Cosa deve fare il sistema IA?","Chi ne sarà impattato?","In quale contesto opera?"]},
  {key:"dati",icon:"📊",label:"Dati e rappresentatività",items:[1,2,5],prompts:["Da dove vengono i dati?","Chi è sottorappresentato?","Dati storici = decisioni storiche?"]},
  {key:"ottimizzazione",icon:"⚙️",label:"Criteri di ottimizzazione",items:[6,12,13],prompts:["Cosa significa 'buon risultato'?","Chi ha definito questo criterio?","Ci sono trade-off etici impliciti?"]},
  {key:"team",icon:"👥",label:"Bias del team",items:[10,11],prompts:["Quali assunzioni porta il team?","Chi manca nella stanza?","Valori impliciti nei requisiti?"]},
  {key:"rischi",icon:"⚠️",label:"Rischi di bias attesi",items:[8],prompts:["Bias computazionali probabili?","Stereotipi che il modello potrebbe apprendere?","Categorie a rischio di esclusione?"]},
  {key:"mitigazione",icon:"🛡️",label:"Misure di mitigazione",items:[9,14],prompts:["Bilanciamento dataset?","Test di fairness previsti?","Override umano quando?"]},
  {key:"trasparenza",icon:"🔍",label:"Trasparenza e spiegabilità",items:[7,17],prompts:["Il modello è interpretabile?","Come comunichiamo le scelte?","Documentazione accessibile?"]},
  {key:"monitoring",icon:"🔄",label:"Monitoraggio post-deploy",items:[4,16],prompts:["Chi monitora gli output?","Con quale frequenza?","Come si segnalano anomalie?"]},
];
const QUADRANTS=[
  {id:"Q1",title:"Tecnico / Operativo",sub:"Computazionale × Operativo",risk:"Medio",bg:"var(--color-blue-light)",border:"var(--color-blue-border)",pillBg:"var(--color-blue-light)",pillTx:"var(--color-blue)"},
  {id:"Q2",title:"Tecnico / Strategico",sub:"Computazionale × Strategico",risk:"Alto",bg:"var(--color-amber-bg)",border:"var(--color-amber-border)",pillBg:"var(--color-amber-bg)",pillTx:"var(--color-amber-border)"},
  {id:"Q3",title:"Sociale / Operativo",sub:"Sociale × Operativo",risk:"Basso",bg:"var(--color-green-bg)",border:"var(--color-green-border)",pillBg:"var(--color-green-bg)",pillTx:"var(--color-green-border)"},
  {id:"Q4",title:"Sociale / Strategico",sub:"Sociale × Strategico",risk:"Critico",bg:"var(--color-red-bg)",border:"var(--color-red-border)",pillBg:"var(--color-red-bg)",pillTx:"var(--color-gap)"},
];
const GUIDELINES=[
  {n:"01",icon:"🧩",title:"Consapevolezza distribuita",text:"Il bias non riguarda solo i data scientist. Coinvolgi fin dall'inizio funzioni diverse: HR, legal, marketing, operazioni. Ogni ruolo ha un punto cieco diverso — la diversità del team è già una forma di mitigazione."},
  {n:"02",icon:"✅",title:"Ethical checkpoint nei milestone",text:"Inserisci momenti formali di revisione etica prima di ogni fase: prima del training, prima del deploy, a 30 giorni post-lancio. Non devono essere burocratici — bastano domande critiche condivise in team."},
  {n:"03",icon:"🔎",title:"Rendere espliciti i criteri di ottimizzazione",text:"Ogni algoritmo ottimizza qualcosa — e quella scelta non è neutrale. Chiedi: 'chi beneficia di questa metrica e chi no?' La scelta di cosa massimizzare è una scelta di valori."},
  {n:"04",icon:"🔁",title:"Monitoraggio continuo, non solo pre-lancio",text:"Il bias può emergere nel tempo (concept drift, cambiamenti demografici, nuovi contesti d'uso). Definisci metriche di fairness da monitorare post-deploy e stabilisci chi è responsabile di attivarsi in caso di anomalia."},
  {n:"05",icon:"🛡️",title:"Cultura della responsabilità algoritmica",text:"I sistemi IA non sono soggetti autonomi. Promuovi un linguaggio interno in cui 'l'algoritmo ha deciso' non sia mai una risposta sufficiente. Accountability e trasparenza sono anche un vantaggio competitivo."},
];
const STEPS=["Intro","Checklist","Canvas","Matrice","Linee Guida","Report"];

// ── STATE ────────────────────────────────────────────────────────────────
let state = {
  step: 0,
  projectName: "",
  answers: {},   // {itemId: bool}
};

function pct() {
  const total = ITEMS.length;
  const done = Object.values(state.answers).filter(Boolean).length;
  return Math.round((done/total)*100);
}

function getStatus(itemIds) {
  const done = itemIds.filter(id => state.answers[id]).length;
  if (done === itemIds.length) return "ok";
  if (done === 0) return "gap";
  return "partial";
}

const STATUS={
  ok:{bg:"var(--color-ok-bg)",border:"var(--color-ok)",dot:"var(--color-ok)",label:"Presidiato",pillBg:"var(--color-ok-pill)",pillTx:"var(--color-ok)"},
  partial:{bg:"var(--color-partial-bg)",border:"var(--color-partial)",dot:"var(--color-partial)",label:"Parziale",pillBg:"var(--color-partial-pill)",pillTx:"var(--color-partial)"},
  gap:{bg:"var(--color-gap-bg)",border:"var(--color-gap)",dot:"var(--color-gap)",label:"Lacuna",pillBg:"var(--color-gap-pill)",pillTx:"var(--color-gap)"},
};

// ── RENDER HEADER ────────────────────────────────────────────────────────
function renderHeader() {
  const ps = document.getElementById('progressSteps');
  ps.innerHTML = STEPS.map((_,i) => {
    let cls = 'progress-step';
    if (i === state.step) cls += ' active';
    else if (i < state.step) cls += ' done';
    return `<div class="${cls}" title="${STEPS[i]}"></div>`;
  }).join('');
  document.getElementById('pctBadge').textContent = pct() + '%';

  const tabs = document.getElementById('navTabs');
  tabs.innerHTML = STEPS.map((s,i) => {
    let cls = 'nav-tab';
    if (i === state.step) cls += ' active';
    const allDone = i > 0 && i < 5 && pct() === 100;
    if (i < state.step) cls += ' done';
    return `<button class="${cls}" onclick="goStep(${i})">${s}</button>`;
  }).join('');
}

// ── STEP RENDERS ────────────────────────────────────────────────────────
function renderIntro() {
  const tools = [
    {icon:"☑️",title:"Checklist",desc:"17 domande su dati, algoritmo, team e governance per verificare i presidi anti-bias."},
    {icon:"🗺️",title:"Canvas",desc:"8 aree tematiche per mappare visivamente rischi e lacune nel progetto IA."},
    {icon:"📐",title:"Matrice",desc:"4 quadranti (tecnico/sociale × operativo/strategico) con livelli di rischio."},
    {icon:"📋",title:"Linee Guida",desc:"5 principi pratici per una governance responsabile dell'IA in azienda."},
  ];
  return `
    <div class="step-content">
      <div class="intro-hero">
        <h1>Il <em>HR Toolkit</em> di Valutazione<br>Etica dell'Intelligenza Artificiale</h1>
        <p>Un toolkit strutturato in 4 strumenti per identificare precocemente i bias e costruire soluzioni più eque e in compliance.<br><br>
Applicabile a tutti i <strong>sistemi e strumenti HR in cui un algoritmo prende o supporta decisioni che impattano le Persone, </strong> e customizzabile.<br><br>
Creato da <a href="https://www.linkedin.com/in/vittoriobellini-hrbp/" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary);text-decoration:underline">Vittorio Bellini</a> — <span style="color:var(--color-text-muted);font-size:var(--text-sm)">linkedin.com/in/vittoriobellini-hrbp</span><br>
<a href="https://prospettiveinorganizzazione.assioa.it/comprendere-i-bias-dellintelligenza-artificiale-riflessioni-da-una-prospettiva-imprenditoriale/" target="_blank" rel="noopener noreferrer" style="color:var(--color-primary);font-size:var(--text-sm);text-decoration:underline">Credits: Smacchia, Cipriano e Za (2025) — ProspettiveinOrganizzazione, ASSIOA</a></p>
      </div>

      <div class="intro-tools">
        ${tools.map(t=>`
          <div class="intro-tool">
            <div class="intro-tool-icon">${t.icon}</div>
            <div class="intro-tool-title">${t.title}</div>
            <div class="intro-tool-desc">${t.desc}</div>
          </div>
        `).join('')}
      </div>

      <div class="privacy-notice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>🔒 Le tue risposte vengono salvate <strong>esclusivamente nel tuo browser</strong>. Nessun dato viene inviato a server esterni.</span>
      </div>

      <div class="project-input-row">
        <div class="form-group">
          <label class="form-label" for="projectNameInput">Nome del progetto / sistema IA</label>
          <input class="form-input" id="projectNameInput" type="text" placeholder="es. Modello di scoring candidati" value="${e(state.projectName)}" oninput="state.projectName=this.value;renderHeader()">
        </div>
        <button class="btn btn-primary btn-lg" onclick="goStep(1)">Inizia →</button>
      </div>

      <div class="intro-quote">
        <blockquote>"I sistemi IA non sono soggetti autonomi — le loro decisioni devono poter essere interrogate, spiegate e corrette."</blockquote>
        <cite>Smacchia, Cipriano e Za — ProspettiveinOrganizzazione, 2025</cite>
      </div>

      <div class="step-nav" style="justify-content:flex-end">
        <button class="btn btn-primary" onclick="goStep(1)">Inizia la valutazione →</button>
      </div>
    </div>
  `;
}

function renderChecklist() {
  const done = Object.values(state.answers).filter(Boolean).length;
  const total = ITEMS.length;
  return `
    <div class="step-content">
      <div class="checklist-header">
        <h2>Checklist Anti-Bias</h2>
        <div class="stats-row">
          <span class="stat-chip" style="background:var(--color-ok-bg);color:var(--color-ok)">${done} presidiati</span>
          <span class="stat-chip" style="background:var(--color-gap-bg);color:var(--color-gap)">${total-done} da verificare</span>
          <span class="stat-chip pill-primary">${pct()}% completato</span>
        </div>
      </div>
      ${GROUPS.map(g => {
        const gItems = ITEMS.filter(i=>i.group===g.key);
        const doneG = gItems.filter(i=>state.answers[i.id]).length;
        return `
          <div class="checklist-group">
            <div class="group-header">
              <span class="group-title">${g.label}</span>
              <span class="group-badge" style="background:${g.key==='Dati'||g.key==='Algoritmo'?'var(--color-blue-light)':'var(--color-green-bg)'};color:${g.color}">${g.badge}</span>
              <span style="font-size:var(--text-xs);color:var(--color-text-muted);margin-left:auto">${doneG}/${gItems.length}</span>
            </div>
            <div class="checklist-items">
              ${gItems.map(item=>`
                <div class="checklist-item${state.answers[item.id]?' checked':''}" onclick="toggleAnswer(${item.id})" role="checkbox" aria-checked="${!!state.answers[item.id]}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')toggleAnswer(${item.id})">
                  <div class="checklist-item-check">
                    ${state.answers[item.id]?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
                  </div>
                  <div class="checklist-item-text">
                    <div class="checklist-item-short">${item.short}</div>
                    <div class="checklist-item-full">${item.text}</div>
                    <div class="checklist-item-tags">
                      <span class="q-tag tag-${item.Q}">${item.Q}</span>
                      <span class="q-tag" style="background:var(--color-surface-offset);color:var(--color-text-muted)">${item.area}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(0)">← Intro</button>
        <button class="btn btn-primary" onclick="goStep(2)">Canvas →</button>
      </div>
    </div>
  `;
}

function renderCanvas() {
  return `
    <div class="step-content">
      <div class="canvas-header">
        <h2>Canvas Progettuale</h2>
        <p>Visualizza le 8 aree chiave del progetto IA. Lo stato di ciascuna area riflette le risposte della checklist.</p>
      </div>
      <div class="status-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-ok)"></div> Presidiato</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-partial)"></div> Parziale</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-gap)"></div> Lacuna</div>
      </div>
      <div class="canvas-grid">
        ${CANVAS_AREAS.map(area => {
          const st = getStatus(area.items);
          const s = STATUS[st];
          return `
            <div class="canvas-card" style="border-color:${s.border};background:${s.bg}">
              <div class="canvas-card-header">
                <div class="canvas-card-title">
                  <span class="canvas-card-icon">${area.icon}</span>
                  ${area.label}
                </div>
                <div style="display:flex;align-items:center;gap:var(--space-2)">
                  <span style="font-size:var(--text-xs);font-weight:700;color:${s.dot}">${s.label}</span>
                  <div class="canvas-status-dot" style="background:${s.dot}"></div>
                </div>
              </div>
              <ul class="canvas-prompts">
                ${area.prompts.map(p=>`<li>${p}</li>`).join('')}
              </ul>
              <div class="canvas-items-list">
                ${area.items.map(id=>{
                  const item = ITEMS.find(i=>i.id===id);
                  const checked = state.answers[id];
                  return `<div class="canvas-mini-item">
                    <div class="canvas-mini-dot" style="background:${checked?'var(--color-ok)':'var(--color-gap)'}"></div>
                    <span style="color:${checked?'var(--color-ok)':'var(--color-text-muted)'};text-decoration:${checked?'none':'none'}">${item.short}</span>
                  </div>`;
                }).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(1)">← Checklist</button>
        <button class="btn btn-primary" onclick="goStep(3)">Matrice →</button>
      </div>
    </div>
  `;
}

function renderMatrix() {
  return `
    <div class="step-content">
      <div class="matrix-header">
        <h2>Matrice Decisionale</h2>
        <p>I 4 quadranti mostrano dove si concentrano i rischi di bias, incrociando la dimensione tecnica/sociale con quella operativa/strategica.</p>
      </div>
      <div class="matrix-axis-label">← Operativo &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Strategico →</div>
      <div class="matrix-grid">
        ${QUADRANTS.map(q => {
          const qItems = ITEMS.filter(i=>i.Q===q.id);
          const done = qItems.filter(i=>state.answers[i.id]).length;
          const pctQ = qItems.length ? Math.round((done/qItems.length)*100) : 0;
          // Dynamic risk: based on % of unchecked items in this quadrant
          const gapPct = qItems.length ? (qItems.length - done) / qItems.length : 0;
          let dynRisk, dynColor, dynBg;
          if (gapPct <= 0.25)       { dynRisk="Basso";   dynColor="var(--color-ok)";      dynBg="var(--color-ok-bg)"; }
          else if (gapPct <= 0.50)  { dynRisk="Medio";   dynColor="var(--color-blue)";    dynBg="var(--color-blue-light)"; }
          else if (gapPct <= 0.75)  { dynRisk="Alto";    dynColor="var(--color-partial)"; dynBg="var(--color-partial-bg)"; }
          else                      { dynRisk="Critico"; dynColor="var(--color-gap)";     dynBg="var(--color-gap-bg)"; }
          return `
            <div class="matrix-card" style="background:${q.bg};border-color:${q.border}">
              <div class="matrix-card-header">
                <div>
                  <div class="matrix-card-title">${q.title}</div>
                  <div class="matrix-card-sub">${q.sub}</div>
                </div>
                <span class="risk-pill" style="background:${dynBg};color:${dynColor}">${dynRisk} ${done}/${qItems.length}</span>
              </div>
              <div class="matrix-items">
                ${qItems.map(item => `
                  <div class="matrix-item${state.answers[item.id]?' checked':''}" onclick="toggleAnswer(${item.id});render()" style="cursor:pointer" title="Clicca per spuntare">
                    <div class="matrix-item-text">${item.short}</div>
                    <div class="matrix-item-status" style="color:${state.answers[item.id]?'var(--color-ok)':'var(--color-gap)'}">
                      ${state.answers[item.id]?'✓ Presidiato':'○ Da verificare'}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(2)">← Canvas</button>
        <button class="btn btn-primary" onclick="goStep(4)">Linee Guida →</button>
      </div>
    </div>
  `;
}

function renderGuidelines() {
  return `
    <div class="step-content">
      <div class="guidelines-header">
        <h2>Linee Guida Operative</h2>
        <p>5 principi pratici per integrare la cultura della responsabilità algoritmica nel ciclo di vita del progetto.</p>
      </div>
      <div class="guidelines-list">
        ${GUIDELINES.map(g=>`
          <div class="guideline-card">
            <div class="guideline-number">${g.n}</div>
            <div class="guideline-icon">${g.icon}</div>
            <div class="guideline-body">
              <div class="guideline-title">${g.title}</div>
              <div class="guideline-text">${g.text}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(3)">← Matrice</button>
        <button class="btn btn-primary" onclick="goStep(5)">Vedi Report →</button>
      </div>
    </div>
  `;
}

function renderReport() {
  const done = Object.values(state.answers).filter(Boolean).length;
  const total = ITEMS.length;
  const score = pct();
  const allDone = done === total;
  const projectLabel = state.projectName || "Progetto senza nome";
  const today = new Date().toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});

  // gaps: items not checked
  const gaps = ITEMS.filter(i=>!state.answers[i.id]);

  // canvas area summary
  const areaRows = CANVAS_AREAS.map(a => {
    const st = getStatus(a.items);
    const s = STATUS[st];
    return {area:a, st, s};
  });

  // Score ring SVG
  const r = 48; const circ = 2*Math.PI*r;
  const offset = circ - (score/100)*circ;

  return `
    <div class="step-content">
      ${allDone ? `
        <div class="success-banner">
          <div class="icon">🎉</div>
          <p>Tutti i presidi sono attivi. Ottimo lavoro!</p>
        </div>
      ` : ''}

      <div class="report-header-section">
        <div class="report-project-name">${e(projectLabel)}</div>
        <div class="report-date">Valutazione del ${today}</div>
        <div class="report-score-ring">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle cx="60" cy="60" r="${r}" stroke="var(--color-border)" stroke-width="8" fill="none"/>
            <circle cx="60" cy="60" r="${r}" stroke="${score>=80?'var(--color-ok)':score>=50?'var(--color-partial)':'var(--color-gap)'}" stroke-width="8" fill="none"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
              style="transition:stroke-dashoffset 1s ease"/>
          </svg>
          <div>
            <div class="report-score-num" style="color:${score>=80?'var(--color-ok)':score>=50?'var(--color-partial)':'var(--color-gap)'}">${score}%</div>
            <div class="report-score-label">${done}/${total}</div>
          </div>
        </div>
        <div class="report-btn-row" style="display:flex;gap:var(--space-3);justify-content:center;margin-top:var(--space-4)">
          <button class="btn btn-secondary" onclick="window.print()" title="Stampa o salva come PDF">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Stampa / PDF
          </button>
          <button class="btn btn-primary" onclick="exportTxt()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Esporta .txt
          </button>
        </div>
      </div>

      <h3 style="font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;margin-bottom:var(--space-4)">Stato per area</h3>
      <div class="report-grid">
        ${areaRows.map(({area,st,s})=>`
          <div class="report-area-card" style="border-color:${s.border};background:${s.bg}">
            <div class="report-area-icon">${area.icon}</div>
            <div class="report-area-title">${area.label}</div>
            <div class="report-area-status" style="color:${s.dot}">${s.label}</div>
          </div>
        `).join('')}
      </div>

      ${gaps.length > 0 ? `
        <div class="report-gaps">
          <h3>Lacune da colmare (${gaps.length})</h3>
          ${gaps.map(item=>`
            <div class="gap-item">
              <div class="gap-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              </div>
              <div>
                <div class="gap-item-text"><strong>${item.short}</strong></div>
                <div class="gap-item-text" style="color:var(--color-text-muted);margin-top:2px">${item.text}</div>
              </div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="step-nav">
        <button class="btn btn-secondary" onclick="goStep(4)">← Linee Guida</button>
        <button class="btn btn-ghost" onclick="resetAll()" style="color:var(--color-gap)">↺ Ricomincia</button>
      </div>
    </div>
  `;
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function e(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleAnswer(id) {
  state.answers[id] = !state.answers[id];
  render();
}

function goStep(n) {
  state.step = n;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll() {
  if (confirm('Vuoi davvero reimpostare tutte le risposte?')) {
    state.answers = {};
    state.step = 0;
    state.projectName = "";
    render();
  }
}

function exportTxt() {
  const done = Object.values(state.answers).filter(Boolean).length;
  const today = new Date().toLocaleDateString('it-IT');
  let txt = `AI BIAS HR TOOLKIT — REPORT\n`;
  txt += `Progetto: ${state.projectName || 'N/D'}\n`;
  txt += `Data: ${today}\n`;
  txt += `Completamento: ${pct()}% (${done}/${ITEMS.length})\n\n`;
  txt += `═══════════════════════════════\nCHECKLIST\n═══════════════════════════════\n`;
  GROUPS.forEach(g => {
    txt += `\n[${g.label.toUpperCase()}]\n`;
    ITEMS.filter(i=>i.group===g.key).forEach(item => {
      txt += `  [${state.answers[item.id]?'X':' '}] ${item.short}\n`;
    });
  });
  txt += `\n═══════════════════════════════\nLACUNE\n═══════════════════════════════\n`;
  ITEMS.filter(i=>!state.answers[i.id]).forEach(item => {
    txt += `• ${item.short}\n  ${item.text}\n\n`;
  });
  txt += `\nBasato su: Smacchia, Cipriano e Za (2025) — ProspettiveinOrganizzazione, ASSIOA.`;

  const blob = new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ai-bias-report-${(state.projectName||'progetto').replace(/\s+/g,'-').toLowerCase()}.txt`;
  a.click();
}

// ── RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderHeader();
  const content = document.getElementById('stepContent');
  const renderers = [renderIntro, renderChecklist, renderCanvas, renderMatrix, renderGuidelines, renderReport];
  content.innerHTML = renderers[state.step]();
}

// ── THEME TOGGLE ─────────────────────────────────────────────────────────
(function(){
  const html = document.documentElement;
  let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  html.setAttribute('data-theme', dark ? 'dark' : 'light');

  document.getElementById('themeToggle').addEventListener('click', () => {
    dark = !dark;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.getElementById('themeToggle').innerHTML = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

document.getElementById('resetBtn').addEventListener('click', resetAll);

// ── INIT ─────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
